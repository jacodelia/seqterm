# Cross.toml — configuration for the `cross` cross-compilation tool.
# See: https://github.com/cross-rs/cross

[build.env]
passthrough = [
    "CARGO_TERM_COLOR",
    "RUST_LOG",
]

# ── Linux ARM64 ───────────────────────────────────────────────────────────────
[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
# Install ALSA + JACK dev headers for the target arch inside the cross image.
# pkg-config for the target is set up automatically once the :arch packages exist.
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install -y libasound2-dev:$CROSS_DEB_ARCH libjack-jackd2-dev:$CROSS_DEB_ARCH",
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = ["PKG_CONFIG_SYSROOT_DIR", "PKG_CONFIG_PATH"]

# ── Linux ARMv7 (Raspberry Pi OS 32-bit) ─────────────────────────────────────
[target.armv7-unknown-linux-gnueabihf]
image = "ghcr.io/cross-rs/armv7-unknown-linux-gnueabihf:main"
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install -y libasound2-dev:$CROSS_DEB_ARCH libjack-jackd2-dev:$CROSS_DEB_ARCH",
]

[target.armv7-unknown-linux-gnueabihf.env]
passthrough = ["PKG_CONFIG_SYSROOT_DIR", "PKG_CONFIG_PATH"]

