# Cross.toml — configuration for the `cross` cross-compilation tool.
# See: https://github.com/cross-rs/cross

[build.env]
passthrough = [
    "CARGO_TERM_COLOR",
    "RUST_LOG",
]

# ── Linux ARM64 ───────────────────────────────────────────────────────────────
[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
# Install ALSA dev headers for the target arch inside the cross image (CPAL's
# Linux backend links libasound). JACK is x86_64-Linux-only, so it isn't needed
# here. pkg-config for the target is set up once the :arch package exists.
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install -y libasound2-dev:$CROSS_DEB_ARCH",
]

[target.aarch64-unknown-linux-gnu.env]
# Point pkg-config at the foreign-arch alsa.pc installed above, and allow it to
# resolve a library whose arch differs from the build host (cross-compile).
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS=1",
    "PKG_CONFIG_SYSROOT_DIR=/",
    "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig",
]

# ── Linux ARMv7 (Raspberry Pi OS 32-bit) ─────────────────────────────────────
[target.armv7-unknown-linux-gnueabihf]
image = "ghcr.io/cross-rs/armv7-unknown-linux-gnueabihf:main"
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install -y libasound2-dev:$CROSS_DEB_ARCH",
]

[target.armv7-unknown-linux-gnueabihf.env]
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS=1",
    "PKG_CONFIG_SYSROOT_DIR=/",
    "PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig",
]

