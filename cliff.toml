# git-cliff configuration for SeqTerm changelog generation.
# See: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n
All notable changes to SeqTerm are documented here.
Format: [Keep a Changelog](https://keepachangelog.com/en/1.0.0/)\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
          {{ commit.message | upper_first }}\
          {% if commit.breaking %} ⚠️ BREAKING{% endif %}\
    {% endfor %}
{% endfor %}\n
"""
footer = """
---
*Generated with [git-cliff](https://git-cliff.org)*
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat",     group = "Added" },
  { message = "^fix",      group = "Fixed" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^revert",   group = "Reverted" },
  { message = "^docs",     group = "Documentation" },
  { message = "^test",     group = "Testing" },
  { message = "^chore",    skip = true },
  { message = "^ci",       skip = true },
  { message = "^build",    skip = true },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
